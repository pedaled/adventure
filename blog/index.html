<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog — Eddie Appelberg</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ── Same colour palette as homepage ── */
    :root {
      --green:       #1E3D2F;
      --green-mid:   #3A6B4A;
      --green-light: #6da874;
      --stone:       #C4B49A;
      --stone-dark:  #8C7B65;
      --red:         #a0503b;
      --red-warm:    #cc7451;
      --yellow:      #D4A94A;
      --text:        #1A1A18;
      --text-muted:  #7A7260;
      --white:       #FDFAF4;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--stone);   /* sandstone throughout */
      color: var(--text);
      min-height: 100vh;
    }

    /* ── NAV — identical to homepage ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.2rem 3rem;
      background: rgba(30, 61, 47, 0.96);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(196,180,154,0.15);
    }

    .lang-switcher { display: flex; align-items: center; gap: 0.4rem; }

    .lang-btn {
      background: none;
      border: none;
      cursor: pointer;
      line-height: 0;
      padding: 0.1rem 0.15rem;
      border-radius: 3px;
      opacity: 0.45;
      transition: opacity 0.2s, transform 0.15s;
    }

    .lang-btn img { display: block; border-radius: 2px; }
    .lang-btn:hover { opacity: 0.85; transform: scale(1.1); }
    .lang-btn.active { display: none; }

    .nav-links { display: flex; gap: 2.5rem; list-style: none; }

    .nav-links a {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone-dark);
      text-decoration: none;
      transition: color 0.2s;
    }

    .nav-links a:hover,
    .nav-links a.active { color: var(--stone); }

    /* ── PAGE HEADER ── */
    .page-header {
      padding: 8rem 3rem 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .page-header .section-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.75rem;
    }

    .page-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      color: var(--green);
      font-weight: 400;
      line-height: 1.1;
    }

    /* ── TABS ── */
    .tabs-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 3rem;
      border-bottom: 2px solid var(--stone-dark);
      display: flex;
      gap: 0;
      margin-top: 2rem;
    }

    .tab-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--stone-dark);
      padding: 0.75rem 1.5rem;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;       /* sits flush on the border */
      transition: color 0.2s, border-color 0.2s;
    }

    .tab-btn:hover { color: var(--green); }

    /* Active tab — dark green background, stone text */
    .tab-btn.active {
      background: var(--green);
      color: var(--stone);
      border-bottom-color: var(--green);
    }

    /* ── POST GRID ── */
    .posts-container {
      max-width: 1200px;
      margin: 2.5rem auto;
      padding: 0 3rem 6rem;
    }

    .posts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    /* ── POST CARD ── */
    .post-card {
      background: var(--white);
      text-decoration: none;
      display: block;
      transition: transform 0.2s;
      border-top: 3px solid var(--red);   /* journal = red */
    }

    .post-card.type-blog {
      border-top-color: var(--yellow);    /* blog = yellow */
    }

    .post-card:hover { transform: translateY(-4px); }

    /* Cover photo area */
    .post-card-cover {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
      background: var(--green-mid);       /* fallback if no photo yet */
    }

    /* No cover image placeholder */
    .post-card-cover-placeholder {
      width: 100%;
      height: 160px;
      background: var(--green-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(196,180,154,0.3);
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.1em;
    }

    .post-card-body { padding: 1.25rem; }

    /* Top row: badge + date */
    .post-card-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    /* "DAY 1" or "GEAR" badge */
    .post-badge {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 2px 8px;
    }

    .post-badge.journal {
      background: var(--green);
      color: var(--green-light);
    }

    .post-badge.blog {
      background: var(--red);
      color: var(--white);
    }

    .post-card-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.62rem;
      color: var(--stone-dark);
      letter-spacing: 0.05em;
    }

    /* Post title / location */
    .post-card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.05rem;
      color: var(--text);
      line-height: 1.4;
      margin-bottom: 0.5rem;
      font-weight: 400;
    }

    /* km + elevation row (journal only) */
    .post-card-stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 0.6rem;
    }

    .post-card-stats span {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    /* Reading time */
    .post-card-readtime {
      font-family: 'DM Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.08em;
      color: var(--stone-dark);
      text-transform: uppercase;
    }

    /* Empty state when no posts yet */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--green);
      padding: 2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    footer .logo {
      font-family: 'Playfair Display', serif;
      color: var(--stone);
      font-size: 1rem;
    }

    footer p {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      color: var(--green-light);
      text-transform: uppercase;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      .posts-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 600px) {
      nav { padding: 1rem 1.5rem; }
      .nav-links { gap: 1.2rem; }
      .page-header { padding: 7rem 1.5rem 1.5rem; }
      .tabs-wrapper { padding: 0 1.5rem; }
      .posts-container { padding: 0 1.5rem 4rem; }
      .posts-grid { grid-template-columns: 1fr; }
      footer { flex-direction: column; gap: 1rem; text-align: center; }
    }
  </style>
</head>

<body>

  <!-- ══ NAV ══ -->
  <nav>
    <div class="lang-switcher">
      <!-- BUG FIX: <button> must be INSIDE <body>, and font-family set for emoji rendering -->
        <div class="lang-switcher">
    <button class="lang-btn active" data-lang="en" title="English">
      <img src="assets/images/flaguk.png" alt="English" width="50" height="50">
    </button>
    <button class="lang-btn" data-lang="sv" title="Svenska">
      <img src="assets/images/flagse.png" alt="Svenska" width="50" height="50">
    </button>
    <button class="lang-btn" data-lang="it" title="Italiano">
      <img src="assets/images/flagit.png" alt="Italiano" width="50" height="50">
    </button>
  </div>
    </div>
    <ul class="nav-links">
      <li><a href="#about"    data-en="About me"  data-sv="Om mig"   data-it="Chi sono">About me</a></li>
      <li><a href="#blog"     data-en="Blog"      data-sv="Blogg"    data-it="Blog">Blog</a></li>
      <li><a href="#links"    data-en="Links"     data-sv="Länkar"   data-it="Link">Links</a></li>
      <li><a href="dashboard" data-en="Routes"    data-sv="Rutter"   data-it="Percorsi">Routes</a></li>
    </ul>
  </nav>
S
  <!-- ══ PAGE HEADER ══ -->
  <div class="page-header">
    <p class="section-tag"
       data-en="// The journal"
       data-sv="// Dagboken"
       data-it="// Il diario">
      // The journal
    </p>
    <h1 data-en="Blog &amp; Journal"
        data-sv="Blogg &amp; Dagbok"
        data-it="Blog &amp; Diario">
      Blog &amp; Journal
    </h1>
  </div>

  <!-- ══ TABS ══ -->
  <div class="tabs-wrapper">
    <button class="tab-btn active" data-tab="journal"
            data-en="Journal" data-sv="Dagbok" data-it="Diario">
      Journal
    </button>
    <button class="tab-btn" data-tab="blog"
            data-en="Blog" data-sv="Blogg" data-it="Blog">
      Blog
    </button>
  </div>

  <!-- ══ POSTS GRID — filled by JS ══ -->
  <div class="posts-container">
    <div class="posts-grid" id="posts-grid">
      <!-- Cards injected here by JavaScript -->
    </div>
  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    <span class="logo">Edvard Appelberg</span>
    <p data-en="Skellefteå, Sweden — Built with HTML &amp; CSS"
       data-sv="Skellefteå, Sverige — Byggd med HTML &amp; CSS"
       data-it="Skellefteå, Svezia — Costruito con HTML &amp; CSS">
      Skellefteå, Sweden — Built with HTML &amp; CSS
    </p>
  </footer>

  <script>
    // ── LANGUAGE SWITCHER (same logic as homepage) ──
    let currentLang = localStorage.getItem('preferred-lang') || 'en';
    const langBtns = document.querySelectorAll('.lang-btn');

    function applyLanguage(lang) {
      currentLang = lang;
      document.querySelectorAll('[data-en]').forEach(el => {
        const t = el.getAttribute('data-' + lang);
        if (t) el.innerHTML = t;
      });
      langBtns.forEach(btn =>
        btn.classList.toggle('active', btn.getAttribute('data-lang') === lang)
      );
      localStorage.setItem('preferred-lang', lang);
      // Re-render cards in new language
      renderCards(activeTab);
    }

    langBtns.forEach(btn =>
      btn.addEventListener('click', () => applyLanguage(btn.getAttribute('data-lang')))
    );

    // ── TABS ──
    let activeTab = 'journal';
    const tabBtns = document.querySelectorAll('.tab-btn');

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.getAttribute('data-tab');
        tabBtns.forEach(b => b.classList.toggle('active', b === btn));
        renderCards(activeTab);
      });
    });

    // ── READING TIME ESTIMATE ──
    // Rough estimate: assumes ~200 words per post for journal, varies for blog
    function readTime(post) {
      // Journal: fixed sections ≈ 300 words. Blog: unknown, show "~5 min" as placeholder
      return post.type === 'journal' ? '3 min read' : '5 min read';
    }

    // ── FORMAT DATE ──
    function formatDate(dateStr, lang) {
      const d = new Date(dateStr);
      const locales = { en: 'en-GB', sv: 'sv-SE', it: 'it-IT' };
      return d.toLocaleDateString(locales[lang] || 'en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ── RENDER CARDS ──
    function renderCards(type) {
      const grid = document.getElementById('posts-grid');
      const filtered = allPosts.filter(p => p.type === type);

      if (filtered.length === 0) {
        const labels = { en: 'No posts yet — check back soon.', sv: 'Inga inlägg ännu — kom tillbaka snart.', it: 'Nessun articolo ancora — torna presto.' };
        grid.innerHTML = `<div class="empty-state">${labels[currentLang]}</div>`;
        return;
      }

      grid.innerHTML = filtered.map(post => {
        const title = post.title[currentLang] || post.title.en;
        const date  = formatDate(post.date, currentLang);
        const rt    = readTime(post);

        // Cover image or placeholder
        const coverHTML = post.cover
          ? `<img class="post-card-cover" src="${post.cover}" alt="${title}" loading="lazy">`
          : `<div class="post-card-cover-placeholder">no photo yet</div>`;

        // Badge: DAY X for journal, TAG for blog
        const badgeText = post.type === 'journal'
          ? ({ en: 'Day', sv: 'Dag', it: 'Giorno' }[currentLang] + ' ' + post.day)
          : post.tag;
        const badgeClass = post.type === 'journal' ? 'journal' : 'blog';

        // km + elevation row (journal only)
        const statsHTML = post.type === 'journal'
          ? `<div class="post-card-stats">
               <span>${post.km} km</span>
               <span>${post.elevation} m ↑</span>
             </div>`
          : '';

        return `
          <a href="post.html?slug=${post.slug}" class="post-card type-${post.type}">
            ${coverHTML}
            <div class="post-card-body">
              <div class="post-card-meta">
                <span class="post-badge ${badgeClass}">${badgeText}</span>
                <span class="post-card-date">${date}</span>
              </div>
              <p class="post-card-title">${title}</p>
              ${statsHTML}
              <p class="post-card-readtime">${rt}</p>
            </div>
          </a>`;
      }).join('');
    }

    // ── LOAD POSTS.JSON AND INIT ──
    let allPosts = [];

    fetch('posts.json')
      .then(r => r.json())
      .then(data => {
        // Sort newest first
        allPosts = data.sort((a, b) => new Date(b.date) - new Date(a.date));
        applyLanguage(currentLang);  // apply language + render cards
      })
      .catch(() => {
        document.getElementById('posts-grid').innerHTML =
          '<div class="empty-state">Could not load posts.</div>';
      });
  </script>

</body>
</html>
